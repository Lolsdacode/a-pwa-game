<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Snake Rogue</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
</head>
<body>
    <div id="game-container">
        <div id="hud">
            <div>Score: <span id="score-val">0</span></div>
            <div>Level: <span id="level-val">1</span></div>
            <div id="xp-bar-container"><div id="xp-bar"></div></div>
            <div>HP: <span id="hp-val">3</span></div>
        </div>

        <canvas id="gameCanvas"></canvas>

        <!-- Upgrade overlay when leveling up -->
        <div id="upgrade-screen" class="hidden">
            <h2>LEVEL UP! Choose a Perk</h2>
            <div id="upgrade-options"></div>
        </div>

        <!-- Game Over overlay -->
        <div id="game-over-screen" class="hidden">
            <h2>GAME OVER</h2>
            <p>You reached Level <span id="final-lvl">1</span></p>
            <button id="restart-btn">Play Again</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
